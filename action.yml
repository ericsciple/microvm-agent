name: "microVM agent harness"
description: >-
  Safely run an AI agent prompt inside a hardware-virtualized microVM. Credentials,
  egress firewall, MCP gateway, and MCP servers stay on the runner host, outside the
  VM. Safe by default. (Prototype — see TODO.md.)
author: "ericsciple"

# NOTE: Zero-dependency ESM action ("type": "module" in package.json), so
# runs.main points directly at src/main.js — no dist bundle needed. The action
# shells out to scripts/*.sh for host provisioning and requires a KVM-capable
# ubuntu-latest runner, docker, sudo, and mitmproxy on PATH (see README/TODO).

inputs:
  prompt:
    description: "The task for the agent."
    required: true
  model:
    description: "Model passed to the Copilot CLI."
    required: false
    default: "auto"
  mcp-config:
    description: >-
      Additional MCP servers as a JSON string in Copilot MCP JSON format
      ({"mcpServers": {...}}). This is also how safe outputs are added (they are
      just MCP servers). Merged in behind the gateway. Real secrets referenced here
      are kept host-side and never placed in the guest's config.
    required: false
    default: ""
  github-mcp:
    description: "Add the default read-only GitHub MCP server (named 'github')."
    required: false
    default: "true"
  firewall-allow:
    description: "Extra egress hosts (newline-separated) allowed on top of the deny-all baseline."
    required: false
    default: ""
  timeout-minutes:
    description: "Hard cap on the agent run."
    required: false
    default: "15"
  github-token:
    description: >-
      Token the HARNESS itself uses host-side — for the inference gateway
      (copilot-requests) and the default read-only 'github' MCP server it provides.
      Held on the host; the guest never sees it. NOTE: this is NOT how safe-output or
      other user MCP servers get a token — those receive it via their own `env` block
      in mcp-config (e.g. GITHUB_TOKEN: ${{ github.token }}), like any MCP server.
      Requires 'copilot-requests: write' for inference. The caller must pass this
      (e.g. github-token: ${{ github.token }}); the action also falls back to the
      GITHUB_TOKEN environment variable.
    required: false
    default: ""

outputs:
  status:
    description: "Result status of the agent run."

runs:
  using: "node20"
  main: "src/main.js"

branding:
  icon: "shield"
  color: "purple"
