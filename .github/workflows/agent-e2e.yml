# End-to-end: an opened issue is triaged by an agent running inside a Firecracker
# microVM, which applies the single most appropriate existing label via the
# add-labels safe output (host-side; the guest never holds a write token).
#
# The agent reads the triggering issue from the event payload we copy into the guest
# (GITHUB_EVENT_PATH -> /etc/event.json), and applies a label via the add-labels safe
# output, delivered to the guest as a CLI shim that forwards to the host-side server.
#
# Requires a KVM-capable ubuntu-latest runner (KVM is available there).
name: agent-e2e

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  copilot-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: no safe-outputs setup step — safe-outputs ships in-the-box with the
      # microvm-agent action (vendored + on PATH). Customers still declare it in mcp-config.

      # Test setup ONLY: make sure the candidate labels exist so add_labels can apply
      # one (the API rejects labels that don't already exist). A real repo already has
      # its labels, so a consumer would not need this step.
      - name: Ensure candidate labels exist (test setup)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for l in bug documentation enhancement question wontfix; do
            gh label create "$l" --force >/dev/null 2>&1 || true
          done

      - name: Run the microVM agent
        id: agent
        env:
          MV_WORKDIR: ${{ runner.temp }}/microvm-agent-work
        uses: ./
        with:
          prompt: |
            You are triaging the GitHub issue this workflow is running on.
            Read the issue from the JSON file at $GITHUB_EVENT_PATH using your bash tool, e.g.:
              jq -r '.issue | "TITLE: \(.title)\n\nBODY: \(.body)"' "$GITHUB_EVENT_PATH"
            Choose the SINGLE most appropriate label from EXACTLY this list:
              bug, documentation, enhancement, question, wontfix
            Apply it by ACTUALLY RUNNING this command with your bash tool (do not just describe it):
              /__mcp/labeler add_labels <label>
            The label applies to the issue this workflow is running on — you do not need an
            issue number. After it succeeds, reply with exactly: DONE
          github-token: ${{ github.token }}
          timeout-minutes: "10"
          mcp-config: |
            {
              "mcpServers": {
                "labeler": {
                  "command": "safe-outputs",
                  "args": ["add-labels"],
                  "env": { "GITHUB_TOKEN": "${{ github.token }}" }
                }
              }
            }

      - name: Verify a label was applied to the issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          n="${{ github.event.issue.number }}"
          echo "agent status: ${{ steps.agent.outputs.status }}"
          echo "labels now on #$n:"
          gh issue view "$n" --json labels --jq '.labels[].name'
          test "$(gh issue view "$n" --json labels --jq '.labels | length')" -ge 1

      - name: Upload VM console + logs on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: microvm-agent-logs
          path: |
            ${{ runner.temp }}/microvm-agent-work/console.log
            ${{ runner.temp }}/microvm-agent-work/gateway.log
            ${{ runner.temp }}/microvm-agent-work/gw-hosts.log
            ${{ runner.temp }}/microvm-agent-work/gw-swaps.log
            ${{ runner.temp }}/microvm-agent-work/gw-blocked.log
            ${{ runner.temp }}/microvm-agent-work/gw-misuse.log
          if-no-files-found: ignore
