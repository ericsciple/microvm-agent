# CI for the microVM agent harness.
#
# Runs the unit tests for the Node logic (mcp-config secret seam, dispatch, guest
# assets, mounts, paths). Manual-only (workflow_dispatch) — we run `npm test`
# locally and don't want a run on every push. Trigger from the Actions tab when
# you want it in CI.
name: ci

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: npm test

