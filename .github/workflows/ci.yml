# CI for the microVM agent harness.
#
# Runs the unit tests for the Node logic — most importantly the security seam in
# src/mcp-config.js (buildGuestMcpConfig + assertNoSecretsInGuestConfig), which
# guarantees no real credential can reach the guest MCP config.
#
# NOTE: this is NOT the full harness end-to-end. Booting a Firecracker microVM and
# running the Copilot CLI inside it requires the host provisioning phases to be
# built first (see TODO.md); ubuntu-latest does have /dev/kvm available for that
# once the harness is wired. The proven, green isolation proofs live in
# docs/proven-prototype/.
name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: npm test
