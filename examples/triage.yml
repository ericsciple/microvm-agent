# Example for a CONSUMER's repo (place in their .github/workflows/). Do NOT add this to
# .github/workflows/ of the microvm-agent repo itself.
name: Issue triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      copilot-requests: write   # inference through the gateway (harness github-token)
      issues: write             # used by the add-labels safe output's token
    steps:
      - uses: actions/checkout@v4
      # Put the safe-outputs CLI on PATH (the Actions way). The harness installs its
      # own gateway (mitmproxy) internally — you don't add anything for that.
      - uses: ericsciple/safe-outputs/setup@v1
      - uses: ericsciple/microvm-agent@v0
        with:
          prompt: "Read this issue and apply the most relevant labels."
          # Safe outputs are just MCP servers: give them a token via their own env,
          # exactly like any MCP server. The harness keeps it host-side.
          mcp-config: |
            {
              "mcpServers": {
                "labeler": {
                  "command": "safe-outputs",
                  "args": ["add-labels"],
                  "env": { "GITHUB_TOKEN": "${{ github.token }}" }
                }
              }
            }

